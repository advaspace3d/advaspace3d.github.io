<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D модели, текстуры и проекты v3.4.0</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #0b0b0e; color: #eaeaea; padding: 30px 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* ===== ШАПКА ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            padding: 16px 0;
            border-bottom: 1px solid #2a2a30;
            margin-bottom: 30px;
        }
        .logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo .version {
            font-size: 13px;
            background: #1a1a22;
            -webkit-text-fill-color: #6b7280;
            padding: 2px 12px;
            border-radius: 30px;
            margin-left: 10px;
            font-weight: 600;
        }
        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .cart-btn {
            background: #2a2a30;
            border: none;
            color: #fff;
            padding: 10px 22px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .cart-btn:hover { background: #3f3f48; }
        .cart-count {
            background: #a78bfa;
            color: #0b0b0e;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
        }

        /* ===== СЛАЙД-БАР ===== */
        .slider-container {
            position: relative;
            width: 100%;
            height: 320px;
            overflow: hidden;
            margin-bottom: 30px;
            background: #1a1a22;
            display: none;
        }
        .slider-container.active {
            display: block;
        }
        .slider-track {
            display: flex;
            transition: transform 0.5s ease-in-out;
            height: 100%;
        }
        .slider-slide {
            min-width: 100%;
            height: 100%;
            position: relative;
            flex-shrink: 0;
        }
        .slider-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .slider-slide .slide-content {
            position: absolute;
            bottom: 40px;
            left: 40px;
            color: #fff;
            text-shadow: 0 2px 20px rgba(0,0,0,0.8);
            max-width: 60%;
        }
        .slider-slide .slide-content h2 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 8px;
        }
        .slider-slide .slide-content p {
            font-size: 18px;
            color: rgba(255,255,255,0.8);
        }
        .slider-slide .slide-content .slide-link {
            display: inline-block;
            margin-top: 12px;
            padding: 10px 28px;
            background: #a78bfa;
            color: #0b0b0e;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            transition: 0.2s;
        }
        .slider-slide .slide-content .slide-link:hover {
            background: #c4b5fd;
        }
        .slider-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.5);
            border: none;
            color: #fff;
            width: 44px;
            height: 44px;
            cursor: pointer;
            font-size: 22px;
            transition: 0.3s;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .slider-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        .slider-btn.prev { left: 16px; }
        .slider-btn.next { right: 16px; }
        .slider-dots {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }
        .slider-dots .dot {
            width: 12px;
            height: 12px;
            background: rgba(255,255,255,0.4);
            cursor: pointer;
            transition: 0.3s;
            border: none;
        }
        .slider-dots .dot.active {
            background: #a78bfa;
            transform: scale(1.2);
        }
        .slider-dots .dot:hover {
            background: rgba(255,255,255,0.8);
        }

        /* ===== ВКЛАДКИ КАТЕГОРИЙ ===== */
        .category-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 1px solid #1a1a22;
            padding-bottom: 14px;
            flex-wrap: wrap;
        }
        .category-tab {
            padding: 10px 28px;
            border: none;
            background: #1a1a22;
            color: #9ca3af;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: 0.25s;
        }
        .category-tab:hover { background: #2a2a32; color: #eaeaea; }
        .category-tab.active { background: #a78bfa; color: #0b0b0e; }
        .category-tab .count {
            background: rgba(255,255,255,0.15);
            padding: 1px 10px;
            font-size: 12px;
            margin-left: 6px;
        }
        .category-tab.active .count { background: rgba(0,0,0,0.2); }

        /* ===== СЕТКА ТОВАРОВ ===== */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 28px;
            margin-top: 10px;
        }
        .product-card {
            background: #16161c;
            padding: 18px;
            transition: 0.25s ease;
            border: 1px solid #24242b;
            position: relative;
        }
        .product-card:hover {
            transform: translateY(-6px);
            border-color: #4b4b5a;
            box-shadow: 0 12px 30px rgba(0,0,0,0.6);
        }
        .product-card .category-badge {
            position: absolute;
            top: 14px;
            right: 14px;
            padding: 4px 12px;
            font-size: 11px;
            font-weight: 600;
            background: #2a1f3d;
            color: #a78bfa;
        }
        .product-card .category-badge.texture { background: #1f2a3d; color: #60a5fa; }
        .product-card .category-badge.project { background: #1a2d2a; color: #34d399; }
        .product-card .image-wrapper {
            width: 100%;
            height: 190px;
            overflow: hidden;
            background: #1f1f26;
            position: relative;
        }
        .product-card .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .product-card .image-wrapper .image-error {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #6b7280;
            font-size: 13px;
            flex-direction: column;
            gap: 4px;
        }
        .product-card h3 {
            font-size: 18px;
            margin: 14px 0 6px;
        }
        .product-card .desc {
            color: #9ca3af;
            font-size: 14px;
            line-height: 1.5;
            min-height: 44px;
        }
        .product-card .price {
            font-size: 22px;
            font-weight: 700;
            color: #a78bfa;
            margin: 12px 0 14px;
        }
        .buy-btn {
            width: 100%;
            background: #a78bfa;
            border: none;
            color: #0b0b0e;
            font-weight: 700;
            font-size: 16px;
            padding: 12px 0;
            cursor: pointer;
            transition: 0.2s;
        }
        .buy-btn:hover { background: #c4b5fd; }
        .buy-btn.added { background: #34d399; }
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: #6b7280;
        }
        .empty-state .icon { font-size: 60px; margin-bottom: 16px; }

        /* ===== МОДАЛКА КОРЗИНЫ ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(6px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #1a1a22;
            max-width: 500px;
            width: 92%;
            padding: 32px 28px;
            border: 1px solid #33333e;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal h2 { font-size: 26px; margin-bottom: 20px; }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #2a2a32;
        }
        .cart-item-info { display: flex; flex-direction: column; }
        .cart-item-name { font-weight: 600; }
        .cart-item-category { font-size: 12px; color: #6b7280; }
        .cart-item-price { color: #a78bfa; font-size: 14px; }
        .cart-item-qty {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .cart-item-qty button {
            background: #2a2a32;
            border: none;
            color: #eaeaea;
            width: 28px;
            height: 28px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 700;
            transition: 0.2s;
        }
        .cart-item-qty button:hover { background: #3f3f48; }
        .cart-item-qty .qty-num {
            font-weight: 600;
            min-width: 20px;
            text-align: center;
        }
        .remove-item {
            background: #3d1f2a;
            border: none;
            color: #f87171;
            padding: 6px 14px;
            cursor: pointer;
            font-size: 13px;
        }
        .cart-total {
            display: flex;
            justify-content: space-between;
            font-size: 22px;
            font-weight: 700;
            margin: 22px 0 18px;
            padding-top: 16px;
            border-top: 2px solid #2a2a32;
        }
        .checkout-btn {
            width: 100%;
            background: #34d399;
            border: none;
            color: #0b0b0e;
            font-weight: 700;
            font-size: 18px;
            padding: 14px 0;
            cursor: pointer;
            transition: 0.25s;
        }
        .checkout-btn:hover { background: #6ee7b7; }
        .close-modal {
            background: none;
            border: none;
            color: #9ca3af;
            float: right;
            font-size: 24px;
            cursor: pointer;
        }
        .clear-cart-btn {
            background: none;
            border: none;
            color: #f87171;
            font-size: 13px;
            cursor: pointer;
            padding: 4px 0;
            margin-bottom: 10px;
        }
        .clear-cart-btn:hover { text-decoration: underline; }

        /* ===== АДАПТИВ ===== */
        @media (max-width: 640px) {
            .header { flex-direction: column; align-items: stretch; gap: 8px; }
            .logo { font-size: 22px; text-align: center; }
            .header-actions { justify-content: center; }
            .slider-container { height: 200px; }
            .slider-slide .slide-content { left: 20px; bottom: 20px; max-width: 80%; }
            .slider-slide .slide-content h2 { font-size: 20px; }
            .slider-slide .slide-content p { font-size: 14px; }
            .slider-btn { width: 32px; height: 32px; font-size: 16px; }
            .category-tabs { overflow-x: auto; flex-wrap: nowrap; }
            .category-tab { white-space: nowrap; padding: 8px 18px; font-size: 13px; }
            .product-grid { grid-template-columns: 1fr 1fr; gap: 16px; }
        }
        @media (max-width: 440px) { .product-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                3D модели, текстуры и проекты
                <span class="version">v3.4.0</span>
            </div>
            <div class="header-actions">
                <button class="cart-btn" id="openCartBtn">
                    🛒 Корзина
                    <span class="cart-count" id="cartCount">0</span>
                </button>
            </div>
        </header>

        <!-- ===== СЛАЙД-БАР ===== -->
        <div class="slider-container" id="sliderContainer">
            <div class="slider-track" id="sliderTrack">
                <!-- Слайды загружаются из JavaScript -->
            </div>
            <button class="slider-btn prev" id="sliderPrev">‹</button>
            <button class="slider-btn next" id="sliderNext">›</button>
            <div class="slider-dots" id="sliderDots"></div>
        </div>

        <!-- ===== ВКЛАДКИ КАТЕГОРИЙ ===== -->
        <div class="category-tabs" id="categoryTabs">
            <button class="category-tab active" data-category="all">
                🏠 Главная
                <span class="count" id="allCount">0</span>
            </button>
            <button class="category-tab" data-category="3d-models">
                🎲 3D-модели
                <span class="count" id="modelsCount">0</span>
            </button>
            <button class="category-tab" data-category="textures">
                🎨 Текстуры
                <span class="count" id="texturesCount">0</span>
            </button>
            <button class="category-tab" data-category="projects">
                📐 Проекты
                <span class="count" id="projectsCount">0</span>
            </button>
        </div>

        <!-- ===== СЕТКА ТОВАРОВ ===== -->
        <div class="product-grid" id="productGrid"></div>

        <!-- ===== МОДАЛКА КОРЗИНЫ ===== -->
        <div class="modal-overlay" id="cartModal">
            <div class="modal">
                <button class="close-modal" id="closeCartBtn">✕</button>
                <h2>🛒 Корзина</h2>
                <button class="clear-cart-btn" id="clearCartBtn">🗑️ Очистить корзину</button>
                <div id="cartItems"><p style="color: #9ca3af;">Корзина пуста</p></div>
                <div class="cart-total">
                    <span>Итого</span>
                    <span id="cartTotalPrice">0 ₽</span>
                </div>
                <button class="checkout-btn" id="checkoutBtn">💳 Оплатить</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
