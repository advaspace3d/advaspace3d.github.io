<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Модели — Купить</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #0b0b0e;
            color: #eaeaea;
            min-height: 100vh;
            padding: 30px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid #2a2a30;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .admin-link {
            color: #6b7280;
            text-decoration: none;
            font-size: 14px;
            padding: 6px 14px;
            border: 1px solid #2a2a30;
            border-radius: 20px;
            transition: 0.2s;
        }

        .admin-link:hover {
            border-color: #a78bfa;
            color: #a78bfa;
        }

        .cart-btn {
            background: #2a2a30;
            border: none;
            color: #fff;
            padding: 10px 22px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .cart-btn:hover {
            background: #3f3f48;
        }

        .cart-count {
            background: #a78bfa;
            color: #0b0b0e;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
        }

        .hero {
            text-align: center;
            padding: 40px 0 50px;
        }

        .hero h1 {
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 12px;
        }

        .hero p {
            color: #9ca3af;
            font-size: 18px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 28px;
            margin-top: 30px;
        }

        .product-card {
            background: #16161c;
            border-radius: 20px;
            padding: 18px 18px 22px;
            transition: 0.25s ease;
            border: 1px solid #24242b;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-6px);
            border-color: #4b4b5a;
            box-shadow: 0 12px 30px rgba(0,0,0,0.6);
        }

        .product-card img {
            width: 100%;
            height: 190px;
            object-fit: cover;
            border-radius: 14px;
            background: #1f1f26;
        }

        .product-card h3 {
            font-size: 18px;
            margin: 14px 0 6px;
        }

        .product-card .desc {
            color: #9ca3af;
            font-size: 14px;
            line-height: 1.5;
            min-height: 44px;
        }

        .product-card .price {
            font-size: 22px;
            font-weight: 700;
            color: #a78bfa;
            margin: 12px 0 14px;
        }

        .buy-btn {
            width: 100%;
            background: #a78bfa;
            border: none;
            color: #0b0b0e;
            font-weight: 700;
            font-size: 16px;
            padding: 12px 0;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
        }

        .buy-btn:hover {
            background: #c4b5fd;
            transform: scale(1.02);
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(6px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: #1a1a22;
            max-width: 500px;
            width: 92%;
            border-radius: 24px;
            padding: 32px 28px;
            border: 1px solid #33333e;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal h2 {
            font-size: 26px;
            margin-bottom: 20px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #2a2a32;
        }

        .cart-item-info {
            display: flex;
            flex-direction: column;
        }

        .cart-item-name {
            font-weight: 600;
        }

        .cart-item-price {
            color: #a78bfa;
            font-size: 14px;
        }

        .remove-item {
            background: #3d1f2a;
            border: none;
            color: #f87171;
            padding: 6px 14px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 13px;
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            font-size: 22px;
            font-weight: 700;
            margin: 22px 0 18px;
            padding-top: 16px;
            border-top: 2px solid #2a2a32;
        }

        .checkout-btn {
            width: 100%;
            background: #34d399;
            border: none;
            color: #0b0b0e;
            font-weight: 700;
            font-size: 18px;
            padding: 14px 0;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.25s;
        }

        .checkout-btn:hover {
            background: #6ee7b7;
        }

        .close-modal {
            background: none;
            border: none;
            color: #9ca3af;
            float: right;
            font-size: 24px;
            cursor: pointer;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6b7280;
        }

        .empty-state svg {
            font-size: 60px;
            margin-bottom: 16px;
        }

        @media (max-width: 640px) {
            .hero h1 { font-size: 28px; }
            .header { flex-wrap: wrap; gap: 12px; }
            .header-actions { width: 100%; justify-content: flex-end; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">✦ 3D Shop</div>
            <div class="header-actions">
                <a href="admin.html" class="admin-link">⚙️ Админка</a>
                <button class="cart-btn" id="openCartBtn">
                    🛒 Корзина
                    <span class="cart-count" id="cartCount">0</span>
                </button>
            </div>
        </header>

        <section class="hero">
            <h1>Качественные 3D модели</h1>
            <p>Скачивайте сразу после покупки. Высокое качество, низкие цены.</p>
        </section>

        <div class="product-grid" id="productGrid">
            <!-- Товары загружаются из localStorage -->
        </div>

        <!-- Модалка корзины -->
        <div class="modal-overlay" id="cartModal">
            <div class="modal">
                <button class="close-modal" id="closeCartBtn">✕</button>
                <h2>🛒 Ваша корзина</h2>
                <div id="cartItems">
                    <p style="color: #9ca3af;">Корзина пуста</p>
                </div>
                <div class="cart-total">
                    <span>Итого</span>
                    <span id="cartTotalPrice">0 ₽</span>
                </div>
                <button class="checkout-btn" id="checkoutBtn">Оплатить сейчас</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
