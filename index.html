<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Shop — Модели и Текстуры</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #0b0b0e;
            color: #eaeaea;
            min-height: 100vh;
            padding: 30px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Шапка */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            padding: 16px 0;
            border-bottom: 1px solid #2a2a30;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .admin-link {
            color: #6b7280;
            text-decoration: none;
            font-size: 14px;
            padding: 6px 14px;
            border: 1px solid #2a2a30;
            border-radius: 20px;
            transition: 0.2s;
        }

        .admin-link:hover {
            border-color: #a78bfa;
            color: #a78bfa;
        }

        .cart-btn {
            background: #2a2a30;
            border: none;
            color: #fff;
            padding: 10px 22px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .cart-btn:hover {
            background: #3f3f48;
        }

        .cart-count {
            background: #a78bfa;
            color: #0b0b0e;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
        }

        /* Герой */
        .hero {
            text-align: center;
            padding: 30px 0 40px;
        }

        .hero h1 {
            font-size: 38px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .hero p {
            color: #9ca3af;
            font-size: 17px;
        }

        /* Вкладки категорий */
        .category-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 1px solid #1a1a22;
            padding-bottom: 14px;
        }

        .category-tab {
            padding: 10px 28px;
            border: none;
            border-radius: 30px;
            background: #1a1a22;
            color: #9ca3af;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: 0.25s;
        }

        .category-tab:hover {
            background: #2a2a32;
            color: #eaeaea;
        }

        .category-tab.active {
            background: #a78bfa;
            color: #0b0b0e;
        }

        .category-tab .count {
            background: rgba(255,255,255,0.15);
            padding: 1px 10px;
            border-radius: 30px;
            font-size: 12px;
            margin-left: 6px;
        }

        .category-tab.active .count {
            background: rgba(0,0,0,0.2);
        }

        /* Сетка товаров */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 28px;
            margin-top: 10px;
        }

        .product-card {
            background: #16161c;
            border-radius: 20px;
            padding: 18px 18px 22px;
            transition: 0.25s ease;
            border: 1px solid #24242b;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-6px);
            border-color: #4b4b5a;
            box-shadow: 0 12px 30px rgba(0,0,0,0.6);
        }

        .product-card .category-badge {
            position: absolute;
            top: 14px;
            right: 14px;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 600;
            background: #2a1f3d;
            color: #a78bfa;
        }

        .product-card .category-badge.texture {
            background: #1f2a3d;
            color: #60a5fa;
        }

        .product-card img {
            width: 100%;
            height: 190px;
            object-fit: cover;
            border-radius: 14px;
            background: #1f1f26;
        }

        .product-card h3 {
            font-size: 18px;
            margin: 14px 0 6px;
        }

        .product-card .desc {
            color: #9ca3af;
            font-size: 14px;
            line-height: 1.5;
            min-height: 44px;
        }

        .product-card .price {
            font-size: 22px;
            font-weight: 700;
            color: #a78bfa;
            margin: 12px 0 14px;
        }

        .buy-btn {
            width: 100%;
            background: #a78bfa;
            border: none;
            color: #0b0b0e;
            font-weight: 700;
            font-size: 16px;
            padding: 12px 0;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
        }

        .buy-btn:hover {
            background: #c4b5fd;
            transform: scale(1.02);
        }

        .buy-btn.added {
            background: #34d399;
        }

        /* Пустое состояние */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: #6b7280;
        }

        .empty-state .icon {
            font-size: 60px;
            margin-bottom: 16px;
        }

        /* Модалка корзины */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(6px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: #1a1a22;
            max-width: 500px;
            width: 92%;
            border-radius: 24px;
            padding: 32px 28px;
            border: 1px solid #33333e;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal h2 {
            font-size: 26px;
            margin-bottom: 20px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #2a2a32;
        }

        .cart-item-info {
            display: flex;
            flex-direction: column;
        }

        .cart-item-name {
            font-weight: 600;
        }

        .cart-item-category {
            font-size: 12px;
            color: #6b7280;
        }

        .cart-item-price {
            color: #a78bfa;
            font-size: 14px;
        }

        .cart-item-qty {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .cart-item-qty button {
            background: #2a2a32;
            border: none;
            color: #eaeaea;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            font-weight: 700;
            transition: 0.2s;
        }

        .cart-item-qty button:hover {
            background: #3f3f48;
        }

        .cart-item-qty .qty-num {
            font-weight: 600;
            min-width: 20px;
            text-align: center;
        }

        .remove-item {
            background: #3d1f2a;
            border: none;
            color: #f87171;
            padding: 6px 14px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 13px;
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            font-size: 22px;
            font-weight: 700;
            margin: 22px 0 18px;
            padding-top: 16px;
            border-top: 2px solid #2a2a32;
        }

        .checkout-btn {
            width: 100%;
            background: #34d399;
            border: none;
            color: #0b0b0e;
            font-weight: 700;
            font-size: 18px;
            padding: 14px 0;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.25s;
        }

        .checkout-btn:hover {
            background: #6ee7b7;
        }

        .close-modal {
            background: none;
            border: none;
            color: #9ca3af;
            float: right;
            font-size: 24px;
            cursor: pointer;
        }

        .clear-cart-btn {
            background: none;
            border: none;
            color: #f87171;
            font-size: 13px;
            cursor: pointer;
            padding: 4px 0;
            margin-bottom: 10px;
        }

        .clear-cart-btn:hover {
            text-decoration: underline;
        }

        /* Адаптив */
        @media (max-width: 640px) {
            .hero h1 { font-size: 28px; }
            .header { flex-direction: column; align-items: stretch; }
            .header-actions { justify-content: flex-end; }
            .category-tabs { overflow-x: auto; flex-wrap: nowrap; }
            .category-tab { white-space: nowrap; padding: 8px 18px; font-size: 13px; }
            .product-grid { grid-template-columns: 1fr 1fr; gap: 16px; }
        }

        @media (max-width: 440px) {
            .product-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Шапка -->
        <header class="header">
            <div class="logo">✦ 3D Shop</div>
            <div class="header-actions">
                <a href="admin.html" class="admin-link">⚙️ Админка v1.2.1</a>
                <button class="cart-btn" id="openCartBtn">
                    🛒 Корзина
                    <span class="cart-count" id="cartCount">0</span>
                </button>
            </div>
        </header>

        <!-- Герой -->
        <section class="hero">
            <h1>3D модели и текстуры</h1>
            <p>Скачивайте сразу после покупки. Высокое качество.</p>
        </section>

        <!-- Вкладки категорий -->
        <div class="category-tabs" id="categoryTabs">
            <button class="category-tab active" data-category="all">
                🎯 Все
                <span class="count" id="allCount">0</span>
            </button>
            <button class="category-tab" data-category="3d-models">
                🎲 3D-модели
                <span class="count" id="modelsCount">0</span>
            </button>
            <button class="category-tab" data-category="textures">
                🎨 Текстуры
                <span class="count" id="texturesCount">0</span>
            </button>
        </div>

        <!-- Сетка товаров -->
        <div class="product-grid" id="productGrid">
            <!-- Товары загружаются через JavaScript -->
        </div>

        <!-- Модалка корзины -->
        <div class="modal-overlay" id="cartModal">
            <div class="modal">
                <button class="close-modal" id="closeCartBtn">✕</button>
                <h2>🛒 Корзина</h2>
                <button class="clear-cart-btn" id="clearCartBtn">🗑️ Очистить корзину</button>
                <div id="cartItems">
                    <p style="color: #9ca3af;">Корзина пуста</p>
                </div>
                <div class="cart-total">
                    <span>Итого</span>
                    <span id="cartTotalPrice">0 ₽</span>
                </div>
                <button class="checkout-btn" id="checkoutBtn">💳 Оплатить</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
