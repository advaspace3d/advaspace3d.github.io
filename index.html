<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Модели — Купить</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #0b0b0e;
            color: #eaeaea;
            min-height: 100vh;
            padding: 30px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid #2a2a30;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .cart-btn {
            background: #2a2a30;
            border: none;
            color: #fff;
            padding: 10px 22px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .cart-btn:hover {
            background: #3f3f48;
        }

        .cart-count {
            background: #a78bfa;
            color: #0b0b0e;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
        }

        /* Hero */
        .hero {
            text-align: center;
            padding: 40px 0 50px;
        }

        .hero h1 {
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 12px;
        }

        .hero p {
            color: #9ca3af;
            font-size: 18px;
        }

        /* Grid товаров */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 28px;
            margin-top: 30px;
        }

        .product-card {
            background: #16161c;
            border-radius: 20px;
            padding: 18px 18px 22px;
            transition: 0.25s ease;
            border: 1px solid #24242b;
        }

        .product-card:hover {
            transform: translateY(-6px);
            border-color: #4b4b5a;
            box-shadow: 0 12px 30px rgba(0,0,0,0.6);
        }

        .product-card img {
            width: 100%;
            height: 190px;
            object-fit: cover;
            border-radius: 14px;
            background: #1f1f26;
        }

        .product-card h3 {
            font-size: 18px;
            margin: 14px 0 6px;
        }

        .product-card .desc {
            color: #9ca3af;
            font-size: 14px;
            line-height: 1.5;
            min-height: 44px;
        }

        .product-card .price {
            font-size: 22px;
            font-weight: 700;
            color: #a78bfa;
            margin: 12px 0 14px;
        }

        .buy-btn {
            width: 100%;
            background: #a78bfa;
            border: none;
            color: #0b0b0e;
            font-weight: 700;
            font-size: 16px;
            padding: 12px 0;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
        }

        .buy-btn:hover {
            background: #c4b5fd;
            transform: scale(1.02);
        }

        /* Модалка корзины */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(6px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: #1a1a22;
            max-width: 500px;
            width: 92%;
            border-radius: 24px;
            padding: 32px 28px;
            border: 1px solid #33333e;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal h2 {
            font-size: 26px;
            margin-bottom: 20px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #2a2a32;
        }

        .cart-item-info {
            display: flex;
            flex-direction: column;
        }

        .cart-item-name {
            font-weight: 600;
        }

        .cart-item-price {
            color: #a78bfa;
            font-size: 14px;
        }

        .remove-item {
            background: #3d1f2a;
            border: none;
            color: #f87171;
            padding: 6px 14px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 13px;
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            font-size: 22px;
            font-weight: 700;
            margin: 22px 0 18px;
            padding-top: 16px;
            border-top: 2px solid #2a2a32;
        }

        .checkout-btn {
            width: 100%;
            background: #34d399;
            border: none;
            color: #0b0b0e;
            font-weight: 700;
            font-size: 18px;
            padding: 14px 0;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.25s;
        }

        .checkout-btn:hover {
            background: #6ee7b7;
        }

        .close-modal {
            background: none;
            border: none;
            color: #9ca3af;
            float: right;
            font-size: 24px;
            cursor: pointer;
        }

        /* Форма загрузки товара (админка) */
        .admin-section {
            margin-top: 60px;
            padding: 30px;
            background: #121218;
            border-radius: 24px;
            border: 1px solid #282830;
        }

        .admin-section h2 {
            font-size: 20px;
            margin-bottom: 18px;
            color: #c4b5fd;
        }

        .admin-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .admin-form input, .admin-form textarea {
            background: #1e1e26;
            border: 1px solid #33333e;
            color: #eaeaea;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
        }

        .admin-form input:focus, .admin-form textarea:focus {
            border-color: #a78bfa;
        }

        .admin-form textarea {
            grid-column: span 2;
            resize: vertical;
            min-height: 50px;
        }

        .admin-form .full-width {
            grid-column: span 2;
        }

        .admin-form button {
            background: #a78bfa;
            border: none;
            color: #0b0b0e;
            font-weight: 700;
            padding: 12px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 16px;
        }

        .admin-form button:hover {
            background: #c4b5fd;
        }

        @media (max-width: 640px) {
            .admin-form { grid-template-columns: 1fr; }
            .admin-form textarea { grid-column: span 1; }
            .admin-form .full-width { grid-column: span 1; }
            .hero h1 { font-size: 28px; }
        }
    </style>
</head>
<body>
    <div class="container">

        <!-- Шапка -->
        <header class="header">
            <div class="logo">✦ 3D Shop</div>
            <button class="cart-btn" id="openCartBtn">
                🛒 Корзина
                <span class="cart-count" id="cartCount">0</span>
            </button>
        </header>

        <!-- Герой -->
        <section class="hero">
            <h1>Качественные 3D модели</h1>
            <p>Скачивайте сразу после покупки. Высокое качество, низкие цены.</p>
        </section>

        <!-- Сетка товаров -->
        <div class="product-grid" id="productGrid">
            <!-- Товары будут добавлены через JavaScript -->
        </div>

        <!-- Модалка корзины -->
        <div class="modal-overlay" id="cartModal">
            <div class="modal">
                <button class="close-modal" id="closeCartBtn">✕</button>
                <h2>🛒 Ваша корзина</h2>
                <div id="cartItems">
                    <p style="color: #9ca3af;">Корзина пуста</p>
                </div>
                <div class="cart-total">
                    <span>Итого</span>
                    <span id="cartTotalPrice">0 ₽</span>
                </div>
                <button class="checkout-btn" id="checkoutBtn">Оплатить сейчас</button>
            </div>
        </div>

        <!-- Админ-панель (загрузка новых товаров) -->
        <section class="admin-section">
            <h2>➕ Добавить новую модель (админ)</h2>
            <div class="admin-form">
                <input type="text" id="productName" placeholder="Название модели (например, Sci-Fi Rifle)">
                <input type="text" id="productPrice" placeholder="Цена в рублях (например, 1490)">
                <textarea id="productDesc" placeholder="Краткое описание (полигоны, форматы, текстуры...)"></textarea>
                <input type="text" id="productImage" placeholder="Ссылка на изображение (URL) — можно использовать любой хостинг картинок">
                <button id="addProductBtn" class="full-width">➕ Добавить товар</button>
            </div>
            <p style="color: #6b7280; font-size: 13px; margin-top: 14px;">
                * Для изображений используйте прямые ссылки (загрузите на Imgur, Google Drive и т.п.)
            </p>
        </section>

    </div>

    <script src="script.js"></script>
</body>
</html>
